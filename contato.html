  <!-- Hero -->
  <section class="hero bg-image text-white d-flex align-items-center" style="background-image: url('images/imagem.jpg'); height: 400px; background-size: cover; background-position: center;">
    <div class="container text-center">
      <h1 class="display-4">Entre em Contato</h1>
    </div>
  </section>

  <!-- Formulário de Contato -->
  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <form>
            <div class="mb-3">
              <label for="nome" class="form-label">Seu Nome</label>
              <input type="text" class="form-control" id="nome" placeholder="Digite seu nome" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Seu Email</label>
              <input type="email" class="form-control" id="email" placeholder="Digite seu email" required>
            </div>
            <div class="mb-3">
              <label for="mensagem" class="form-label">Sua Mensagem</label>
              <textarea class="form-control" id="mensagem" rows="5" placeholder="Digite sua mensagem" required></textarea>
            </div>
            <button type="submit" class="btn btn-dark">Enviar</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <script>
    // JavaScript para ajustar a opacidade da navbar ao rolar a página
