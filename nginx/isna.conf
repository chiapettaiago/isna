server {
    listen 80;
    server_name _;

    root /var/www/html/isna;
    index index.php;

    client_max_body_size 32m;

    location / {
        try_files $uri $uri/ /index.php?route=$uri&$query_string;
    }

    location ^~ /documento/ {
        try_files $uri /index.php?route=$uri&$query_string;
    }

    location ~ ^/(app|config|data|legacy_archive|logs|scripts|templates)/ {
        deny all;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_pass php:9000;
    }

    location ~* \.(?:css|js|gif|ico|jpe?g|png|svg|webp|mp4|webm|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }
}
